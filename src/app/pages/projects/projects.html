<div class="projects-container">
  <h2>Mis Proyectos</h2>
  <p class="subtitle">Selecciona un proyecto para ver sus evidencias (imágenes, código y detalles).</p>

  <div class="projects-grid">
    <div class="project-card" *ngFor="let proyecto of listaProyectos" [routerLink]="['/proyectos', proyecto.id]">
      <div class="card-content">
        <h3>{{ proyecto.titulo }}</h3>
        <p>{{ proyecto.descripcion }}</p>
        
        <div class="tech-tags">
          <span class="tag" *ngFor="let tech of proyecto.tecnologias">{{ tech }}</span>
        </div>
      </div>
      <div class="card-footer">
        <span>Ver detalles ➔</span>
      </div>
    </div>
  </div>
</div>
